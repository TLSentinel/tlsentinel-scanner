name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  release-linux:
    name: Build Linux & Docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux Binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${GITHUB_REF_NAME#v} -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-amd64 ./cmd/scanner
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-arm64 ./cmd/scanner

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  release-windows:
    name: Build & Sign Windows
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write 
    
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Windows PE resource
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          $VERSION_BARE = "${{ github.ref_name }}".TrimStart('v')
          $VER_PARTS = $VERSION_BARE.Split('.')
          & $(go env GOPATH)/bin/goversioninfo.exe `
            -file-version="$VERSION_BARE" -product-version="$VERSION_BARE" `
            -ver-major=$($VER_PARTS[0]) -ver-minor=$($VER_PARTS[1]) -ver-patch=$($VER_PARTS[2]) `
            -o cmd/scanner/resource_windows_amd64.syso cmd/scanner/versioninfo.json

      - name: Build Windows Binary
        run: |
          $LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${{ github.ref_name }} -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          $env:CGO_ENABLED="0"; $env:GOOS="windows"; $env:GOARCH="amd64"
          go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-windows-amd64.exe ./cmd/scanner

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows Binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://eastus.codesigning.azure.net/
          trusted-signing-account-name: dennissigning
          certificate-profile-name: TLSentinel-Release
          files-directory: ./dist

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tlsentinel-scanner-windows-amd64.exe

  release-macos:
    name: Build & Notarize macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS Binary
        run: |
          LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${{ github.ref_name }} -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-darwin-arm64 ./cmd/scanner

      - name: Package for Release
        run: |
          zip -j dist/tlsentinel-scanner-darwin-arm64.zip dist/tlsentinel-scanner-darwin-arm64

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tlsentinel-scanner-darwin-arm64
            dist/tlsentinel-scanner-darwin-arm64.zip