name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate Windows PE resource
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo \
            -file-version="${{ github.ref_name }}" \
            -product-version="${{ github.ref_name }}" \
            -ver-major=0 -ver-minor=0 -ver-patch=0 \
            -o cmd/scanner/resource_windows_amd64.syso \
            cmd/scanner/versioninfo.json

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w \
            -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${{ github.ref_name }} \
            -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }} \
            -X github.com/tlsentinel/tlsentinel-scanner/internal/version.BuildTime=${{ github.event.head_commit.timestamp }}"

          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-amd64       ./cmd/scanner
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-arm64       ./cmd/scanner
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-darwin-arm64      ./cmd/scanner
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-windows-amd64.exe ./cmd/scanner

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
