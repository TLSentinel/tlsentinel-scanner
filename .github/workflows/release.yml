name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  release-linux:
    name: Build Linux & Docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY@L}" >> $GITHUB_ENV
          echo "VERSION_BARE=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-beta.') }}
            type=raw,value=rc,enable=${{ contains(github.ref_name, '-rc.') }}

      - name: Build and push Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION_BARE }}
            COMMIT=${{ github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux Binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${GITHUB_REF_NAME#v} -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-amd64 ./cmd/scanner
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-linux-arm64 ./cmd/scanner

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*

  release-windows:
    name: Build & Sign Windows
    runs-on: windows-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate Windows PE resource
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          $VERSION_BARE = "${{ github.ref_name }}".TrimStart('v')
          $GOPATH = go env GOPATH
          & "$GOPATH\bin\goversioninfo.exe" `
            -file-version="$VERSION_BARE" `
            -product-version="$VERSION_BARE" `
            -propagate-ver-strings `
            -o cmd/scanner/resource_windows_amd64.syso `
            cmd/scanner/versioninfo.json

      - name: Build Windows Binary
        run: |
          $VERSION_BARE = "${{ github.ref_name }}".TrimStart('v')
          $LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=$VERSION_BARE -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          $env:CGO_ENABLED="0"; $env:GOOS="windows"; $env:GOARCH="amd64"
          go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-windows-amd64.exe ./cmd/scanner

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows Binary
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: ./dist
          files-folder-filter: exe

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/tlsentinel-scanner-windows-amd64.exe

  release-macos:
    name: Build & Notarize macOS
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS Binary
        run: |
          LDFLAGS="-s -w -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Version=${GITHUB_REF_NAME#v} -X github.com/tlsentinel/tlsentinel-scanner/internal/version.Commit=${{ github.sha }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/tlsentinel-scanner-darwin-arm64 ./cmd/scanner

      - name: Package for Release
        run: |
          zip -j dist/tlsentinel-scanner-darwin-arm64.zip dist/tlsentinel-scanner-darwin-arm64

      - name: Add to Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/tlsentinel-scanner-darwin-arm64
            dist/tlsentinel-scanner-darwin-arm64.zip