name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Generate Windows PE resource
        run: |
          goversioninfo \
            -file-version="dev" \
            -product-version="dev" \
            -ver-major=0 -ver-minor=0 -ver-patch=0 \
            -o cmd/scanner/resource.syso \
            cmd/scanner/versioninfo.json

      - name: Build
        run: go build ./...

      - name: Build (Windows cross-compile)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./cmd/scanner

      - name: Vet
        run: go vet ./...
